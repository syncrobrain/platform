openapi: 3.1.0
info:
  title: SyncroBrain Device API
  version: 1.0.0
servers:
  - url: http://localhost:13100/api/v1
paths:
  /health:
    get:
      operationId: health
      responses:
        "200":
          description: OK
  /devices:
    get:
      operationId: listDevices
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Device list
    post:
      operationId: createDevice
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeviceRequest"
      responses:
        "201":
          description: Created
  /devices/{id}:
    get:
      operationId: getDevice
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Device
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateDeviceRequest:
      type: object
      required: [name, protocol]
      properties:
        name: { type: string }
        protocol: { type: string, enum: [mqtt, modbus, http] }
        metadata: { type: object, additionalProperties: true }
