      <stop offset="1" stop-color="#0d1428"/>
    </linearGradient>
    <linearGradient id="glow" x1="200" y1="100" x2="900" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#06b6d4" stop-opacity="0.08"/>
